<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#f0f0f0"/>
  <rect width="400" height="400" fill="#1a3a8f" opacity="0.08"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grid)"/>

  <!-- T-shirt shadow -->
  <path d="M 120,60 L 80,80 L 60,120 L 80,130 L 80,280 L 320,280 L 320,130 L 340,120 L 320,80 L 280,60 L 260,100 L 200,90 L 140,100 Z" fill="#000000" opacity="0.12" transform="translate(4,4)"/>
  
  <!-- T-shirt body -->
  <path d="M 120,60 L 80,80 L 60,120 L 80,130 L 80,280 L 320,280 L 320,130 L 340,120 L 320,80 L 280,60 L 260,100 L 200,90 L 140,100 Z" fill="#1a3a8f" stroke="#333333" stroke-width="2"/>
  
  <!-- Sleeve left -->
  <path d="M 80,80 L 60,120 L 80,130 L 80,100 Z" fill="#1a3a8f" stroke="#333333" stroke-width="2"/>
  
  <!-- Sleeve right -->
  <path d="M 320,80 L 340,120 L 320,130 L 320,100 Z" fill="#1a3a8f" stroke="#333333" stroke-width="2"/>
  
  <!-- Collar -->
  <path d="M 140,100 Q 200,120 260,100 Q 240,80 200,75 Q 160,80 140,100 Z" fill="#1a3a8f" stroke="#333333" stroke-width="2"/>
  
  <!-- Graphic/text on shirt -->
  
        <text x="200" y="185" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#CCFF00" letter-spacing="1">BOLSONIER</text>
        <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.6">STREETWEAR AUTORAL</text>
        
  
  <!-- Color label pill -->
  <rect x="130" y="308" width="140" height="24" rx="12" fill="#CCFF00"/>
  <text x="200" y="324" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#ffffff" letter-spacing="1">AZUL ROYAL · COSTAS</text>
  
  <!-- Brand watermark -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999999" letter-spacing="2">BOLSONIER STORE · PRÉ-VENDA</text>
</svg>